name: Release

# Triggered by pushing a version tag, e.g.: git tag v1.0.1 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.1)'
        required: true
        default: '1.0.1'

jobs:

  # ── Build Windows installer ──────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win -- --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/Prism-Setup.exe

  # ── Build Mac zip (arm64) — zip avoids the hdiutil bug in electron-builder ────
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Override mac target to arm64 zip for CI
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.build.mac.target = [{ target: 'zip', arch: ['arm64'] }];
          pkg.build.mac.artifactName = 'Prism-mac-arm64.zip';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Build Mac (arm64 zip)
        run: npm run build:mac -- --publish never

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/Prism-mac-arm64.zip

  # ── Create GitHub Release with all binaries ──────────────────────────────────
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create tag if triggered manually
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag "${{ steps.tag.outputs.name }}" || true
          git push origin "${{ steps.tag.outputs.name }}" || true

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-files

      - name: Download Mac builds
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: release-files/*
          generate_release_notes: true

  # ── Deploy landing page + version.json to Netlify ────────────────────────────
  # Requires two GitHub repo secrets:
  #   NETLIFY_AUTH_TOKEN  — generate at https://app.netlify.com/user/applications
  #   NETLIFY_SITE_ID     — found in Site Settings → General → Site ID
  #
  # The GitHub repo must be PUBLIC for the releases/latest/download/ URLs to work
  # without authentication.
  deploy-site:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write version.json for this release
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          printf '{"version":"%s","siteUrl":"https://charming-lebkuchen-648010.netlify.app"}\n' "$VERSION" > site/version.json

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: netlify deploy --dir=site --prod --message "Release $GITHUB_REF_NAME"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
