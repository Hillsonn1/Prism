name: Build Mac DMG

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac DMG
        run: npm run build:mac -- --publish never

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Prism-Mac
          path: dist/*.dmg
          retention-days: 30
